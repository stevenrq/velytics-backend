databases:
  - name: velytics-postgres
    plan: free
    databaseName: velytics
    user: velytics

services:
  - type: web
    name: velytics-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: velytics-postgres
          property: connectionString

      # RS256 keypair delivered as Render Secret Files, mounted at
      # /etc/secrets/<filename>. Generate locally with:
      #   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out private.pem
      #   openssl rsa -pubout -in private.pem -out public.pem
      # then upload both as Secret Files named jwt-private.pem / jwt-public.pem.
      - key: JWT_ISSUER
        sync: false
      - key: JWT_PRIVATE_KEY_FILE
        value: /etc/secrets/jwt-private.pem
      - key: JWT_PUBLIC_KEY_FILE
        value: /etc/secrets/jwt-public.pem
      - key: JWT_ACCESS_TTL_SECONDS
        value: 900
      - key: JWT_REFRESH_TTL_DAYS
        value: 7

      - key: CORS_ALLOWED_ORIGINS
        sync: false

      - key: THROTTLE_AUTH_LIMIT
        value: 10
      - key: THROTTLE_AUTH_TTL_SECONDS
        value: 60

      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_FIRST_NAME
        sync: false
      - key: ADMIN_LAST_NAME
        sync: false
      - key: ADMIN_NATIONAL_ID
        sync: false
      - key: ADMIN_PHONE_NUMBER
        sync: false

      - key: SERVICE_API_KEY
        generateValue: true

      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: S3_UPLOAD_URL_TTL_SECONDS
        value: 600
      - key: S3_DOWNLOAD_URL_TTL_SECONDS
        value: 900

      - key: DASHBOARD_CACHE_TTL_SECONDS
        value: 60
