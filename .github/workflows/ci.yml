name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run build
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: velytics
          POSTGRES_PASSWORD: velytics
          POSTGRES_DB: velytics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U velytics -d velytics"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://velytics:velytics@localhost:5432/velytics?schema=public
      JWT_ISSUER: http://localhost:3000
      JWT_ACCESS_TTL_SECONDS: '900'
      JWT_REFRESH_TTL_DAYS: '7'
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      THROTTLE_AUTH_LIMIT: '1000'
      THROTTLE_AUTH_TTL_SECONDS: '60'
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Admin123!
      ADMIN_EMAIL: admin@velytics.local
      ADMIN_FIRST_NAME: Admin
      ADMIN_LAST_NAME: Velytics
      ADMIN_NATIONAL_ID: '1000000000'
      ADMIN_PHONE_NUMBER: '3000000000'
      SERVICE_API_KEY: ci-only-service-key-not-a-secret-32chars
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET: velytics-vehicles-ci
      DASHBOARD_CACHE_TTL_SECONDS: '60'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Generate an ephemeral RS256 keypair for this CI run
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out private.pem
          openssl rsa -pubout -in private.pem -out public.pem
          echo "JWT_PRIVATE_KEY_B64=$(base64 -w0 private.pem)" >> "$GITHUB_ENV"
          echo "JWT_PUBLIC_KEY_B64=$(base64 -w0 public.pem)" >> "$GITHUB_ENV"
          rm private.pem public.pem

      - run: npm run build
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npm run test:e2e
