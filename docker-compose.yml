services:
  postgres:
    image: postgres:18-alpine
    container_name: velytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: velytics
      POSTGRES_PASSWORD: velytics
      POSTGRES_DB: velytics
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U velytics -d velytics' ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: velytics-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://velytics:velytics@postgres:5432/velytics?schema=public
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1' ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-data:
